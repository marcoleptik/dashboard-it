<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Onboarding RS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="admin-page">
    <div class="admin-container">
        <!-- Top bar -->
        <header class="admin-header">
            <div class="admin-header-left">
                <img src="assets/rs_logo.jpg" alt="Recommerce" class="admin-logo">
                <h1>Onboarding - Dashboard</h1>
            </div>
            <div class="admin-header-right">
                <span class="admin-user" id="admin-user-name"></span>
                <button class="btn btn-secondary btn-sm" id="btn-manage-users" style="display:none;">
                    <span class="material-icons">group</span> Utilisateurs
                </button>
                <button class="btn btn-secondary btn-sm" id="btn-logout">
                    <span class="material-icons">logout</span> Déconnexion
                </button>
            </div>
        </header>

        <!-- Main content -->
        <main class="admin-main">
            <!-- Stats -->
            <div class="admin-stats" id="admin-stats">
                <div class="stat-card">
                    <span class="material-icons">description</span>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-total">0</span>
                        <span class="stat-label">Soumissions totales</span>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="material-icons">today</span>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-today">0</span>
                        <span class="stat-label">Aujourd'hui</span>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="material-icons">calendar_month</span>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-month">0</span>
                        <span class="stat-label">Ce mois</span>
                    </div>
                </div>
            </div>

            <!-- Submissions table -->
            <div class="admin-section">
                <div class="section-header">
                    <h2>Formulaires soumis</h2>
                    <input type="text" id="search-submissions" class="search-input" placeholder="Rechercher par nom, email...">
                </div>
                <div class="table-container">
                    <table class="submissions-table" id="submissions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Prénom</th>
                                <th>Nom</th>
                                <th>Email</th>
                                <th>Contrat</th>
                                <th>Poste</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="submissions-body">
                        </tbody>
                    </table>
                    <div id="no-submissions" class="empty-state" style="display:none;">
                        <span class="material-icons">inbox</span>
                        <p>Aucune soumission pour le moment</p>
                    </div>
                </div>
            </div>

            <!-- User management (admin only) -->
            <div class="admin-section" id="users-section" style="display:none;">
                <div class="section-header">
                    <h2>Gestion des utilisateurs</h2>
                </div>
                <div class="add-user-form">
                    <input type="text" id="new-user-name" placeholder="Nom complet">
                    <input type="email" id="new-user-email" placeholder="Email">
                    <input type="password" id="new-user-password" placeholder="Mot de passe" autocomplete="new-password">
                    <select id="new-user-role">
                        <option value="member">Membre</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button class="btn btn-primary btn-sm" id="btn-add-user">
                        <span class="material-icons">person_add</span> Ajouter
                    </button>
                </div>
                <div id="add-user-error" class="login-error" style="display:none;"></div>
                <table class="submissions-table" id="users-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-body">
                    </tbody>
                </table>
            </div>
        </main>

        <!-- Detail modal -->
        <div class="modal-overlay" id="detail-modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Détail de la soumission</h2>
                    <button class="modal-close" id="modal-close">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <div class="modal-body" id="modal-body">
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
